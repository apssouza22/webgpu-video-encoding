<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gpu-video-export</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #111;
        color: #eee;
      }
      main {
        max-width: 960px;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        background: #7eb8ff;
        color: #07121f;
        cursor: pointer;
        font-weight: 700;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .composition-player {
        position: relative;
        width: min(100%, 960px);
        overflow: hidden;
        border: 1px solid #2b2b2b;
        border-radius: 12px;
        background: #000;
      }
      .composition-player__canvas {
        display: block;
        width: 100%;
      }
      .composition-player__controls {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: #181818;
      }
      .composition-player__controls input[type='range'] {
        width: 100%;
      }
      .composition-player__time {
        min-width: 72px;
        text-align: right;
        font: 13px/1.5 ui-monospace, monospace;
        color: #bbb;
      }
      #status {
        white-space: pre-wrap;
        font: 13px/1.5 ui-monospace, monospace;
        max-width: 720px;
      }
      a {
        color: #7eb8ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>gpu-video-export</h1>
      <div id="player"></div>
      <div class="actions">
        <button id="export-button" type="button" disabled>Export composition</button>
        <p id="status">Initializing…</p>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
